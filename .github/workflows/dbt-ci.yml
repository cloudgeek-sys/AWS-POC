name: dbt CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  dbt-run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipelines/requirements.txt
          pip install dbt-core==1.8.8 dbt-duckdb==1.8.2 duckdb==1.1.3

      - name: Generate local pipeline artifacts
        run: |
          python scripts/local_simulate_incremental.py \
            --source-dir datasets \
            --incremental-dir datasets \
            --output-dir artifacts/local

      - name: Verify bronze artifacts exist
        run: |
          bronze_count=$(find artifacts/local/bronze -type f -name '*.parquet' | wc -l)
          if [ "$bronze_count" -eq 0 ]; then
            echo "ERROR: No bronze parquet files were generated in artifacts/local/bronze."
            exit 1
          fi
          echo "Bronze artifact check passed: ${bronze_count} parquet file(s) found."

      - name: Verify silver artifacts exist
        run: |
          if [ ! -f artifacts/local/silver/stg_power_plants.parquet ]; then
            echo "ERROR: Missing expected silver artifact: artifacts/local/silver/stg_power_plants.parquet"
            exit 1
          fi
          echo "Silver artifact check passed: stg_power_plants.parquet found."

      - name: Verify gold artifacts exist
        run: |
          gold_count=$(find artifacts/local/gold -type f -name '*.parquet' | wc -l)
          if [ "$gold_count" -eq 0 ]; then
            echo "ERROR: No gold parquet files were generated in artifacts/local/gold."
            exit 1
          fi
          echo "Gold artifact check passed: ${gold_count} parquet file(s) found."

      - name: Prepare DuckDB fixtures for dbt
        run: |
          python scripts/dbt_prepare_duckdb.py \
            --artifacts-root artifacts/local \
            --db-path analytics/dbt/gppa_ci.duckdb

      - name: dbt run
        working-directory: analytics/dbt
        env:
          DBT_PROFILES_DIR: .
        run: |
          cp profiles.yml.ci profiles.yml
          dbt deps
          dbt run --target ci

      - name: dbt test
        working-directory: analytics/dbt
        env:
          DBT_PROFILES_DIR: .
        run: |
          dbt test --target ci
